<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — Josh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0E0E0F;
      --bg2:      #161618;
      --dark:     #F0EDE8;
      --muted:    #6B6760;
      --accent:   #9D6FFF;
      --accent-l: #1E1530;
      --border:   #242424;
      --font:     'Space Grotesk', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 64px;
      background: rgba(14,14,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--dark); text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 36px; align-items: center; }
    .nav-links a {
      font-size: 15px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--dark); }
    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { transition: transform 0.2s; }
    .nav-back:hover svg { transform: translateX(-3px); }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position: fixed; top: 64px; left: 0; z-index: 99;
      height: 2px; width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }

    /* ── HERO ── */
    .post-hero {
      padding: 140px 56px 72px;
      max-width: 860px;
      margin: 0 auto;
      opacity: 0;
    }
    .post-tags { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .post-tag {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--accent);
      background: var(--accent-l); padding: 5px 12px; border-radius: 4px;
    }
    .post-title {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700; letter-spacing: -2px; line-height: 1.05;
      margin-bottom: 24px; color: var(--dark);
    }
    .post-description {
      font-size: 20px; color: var(--muted);
      line-height: 1.6; margin-bottom: 36px;
      text-wrap: pretty; max-width: 680px;
    }
    .post-meta {
      display: flex; align-items: center; gap: 20px;
      font-size: 14px; color: var(--muted); font-weight: 500;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .post-meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

    /* ── LAYOUT ── */
    .post-layout {
      display: grid;
      grid-template-columns: 1fr min(680px, 100%) 1fr;
      gap: 0;
      padding: 0 56px 120px;
    }
    .post-content { grid-column: 2; opacity: 0; }

    /* ── TOC SIDEBAR ── */
    .post-toc {
      grid-column: 3;
      padding-left: 48px;
      padding-top: 8px;
      opacity: 0;
    }
    .toc-inner {
      position: sticky; top: 88px;
    }
    .toc-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px;
    }
    .toc-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .toc-list a {
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; line-height: 1.4;
      transition: color 0.2s; display: block;
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }
    .toc-list a:hover, .toc-list a.active {
      color: var(--accent); border-left-color: var(--accent);
    }

    /* ── MARKDOWN CONTENT ── */
    .prose { line-height: 1.8; }

    .prose h1 { display: none; } /* title is in hero */
    .prose h2 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      margin: 56px 0 20px; color: var(--dark);
      padding-top: 8px;
    }
    .prose h3 {
      font-size: 20px; font-weight: 700;
      margin: 36px 0 16px; color: var(--dark);
    }
    .prose p {
      font-size: 17px; color: #A09890;
      margin-bottom: 20px; text-wrap: pretty;
    }
    .prose ul, .prose ol {
      margin: 0 0 20px 24px; display: flex; flex-direction: column; gap: 8px;
    }
    .prose li { font-size: 17px; color: #A09890; line-height: 1.7; }
    .prose strong { font-weight: 700; color: var(--dark); }
    .prose em { font-style: italic; color: var(--muted); }
    .prose a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent-l); }
    .prose a:hover { text-decoration-color: var(--accent); }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px; margin: 28px 0;
      background: var(--accent-l); border-radius: 0 8px 8px 0;
    }
    .prose blockquote p { color: var(--accent); margin: 0; font-size: 16px; }
    .prose hr {
      border: none; border-top: 1px solid var(--border);
      margin: 48px 0;
    }
    .prose table {
      width: 100%; border-collapse: collapse; margin: 28px 0; font-size: 15px;
    }
    .prose th {
      text-align: left; padding: 10px 16px;
      background: var(--bg2); font-weight: 600; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .prose td {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      color: #A09890;
    }
    .prose tr:last-child td { border-bottom: none; }
    .prose code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      background: var(--bg2); color: var(--accent);
      padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }
    .prose pre {
      background: #1a1510 !important;
      border-radius: 12px; overflow: auto;
      margin: 24px 0; padding: 0 !important;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .prose pre code {
      background: none; color: inherit;
      padding: 24px; border: none;
      display: block; font-size: 14px; line-height: 1.7;
    }

    /* ── NEXT POSTS ── */
    .next-posts {
      padding: 64px 56px 80px;
      border-top: 1px solid var(--border);
      max-width: calc(860px + 112px);
      margin: 0 auto;
    }
    .next-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 28px;
    }
    .next-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .next-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
      text-decoration: none; color: inherit;
      transition: transform 0.2s, border-color 0.2s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .next-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .next-card-dir { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .next-card h4 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; }

    /* ── LOADING STATE ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; font-size: 14px; color: var(--muted);
      gap: 12px;
    }
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 404 ── */
    .not-found {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 16px; text-align: center;
    }
    .not-found h2 { font-size: 28px; font-weight: 700; }
    .not-found p { color: var(--muted); }

    @media (max-width: 900px) {
      nav { padding: 0 24px; }
      .post-hero { padding: 120px 24px 56px; }
      .post-layout { grid-template-columns: 1fr; padding: 0 24px 80px; }
      .post-content { grid-column: 1; }
      .post-toc { display: none; }
      .next-posts { padding: 48px 24px 64px; }
      .next-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Josh<span>.</span></a>
  <div class="nav-links">
    <a class="nav-back" href="index.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back home
    </a>
  </div>
</nav>

<div id="progress-bar"></div>

<div id="post-hero" class="post-hero">
  <div class="loading"><div class="spinner"></div> Loading…</div>
</div>

<div class="post-layout" id="post-layout" style="display:none">
  <div></div>
  <article class="post-content prose" id="post-content"></article>
  <aside class="post-toc" id="post-toc">
    <div class="toc-inner">
      <p class="toc-label">On this page</p>
      <ul class="toc-list" id="toc-list"></ul>
    </div>
  </aside>
</div>

<div class="next-posts" id="next-posts" style="display:none">
  <p class="next-label">More articles</p>
  <div class="next-grid" id="next-grid"></div>
</div>

<footer style="padding:32px 56px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
  <p style="font-size:14px; color:var(--muted)">© 2026 Josh. Built with curiosity.</p>
  <div style="display:flex; gap:24px;">
    <a href="#" style="font-size:14px; color:var(--muted); text-decoration:none;">GitHub</a>
    <a href="#" style="font-size:14px; color:var(--muted); text-decoration:none;">Twitter</a>
  </div>
</footer>

<script>
  // ── Reading progress bar ──
  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const total = document.body.scrollHeight - window.innerHeight;
    document.getElementById('progress-bar').style.width = (scrolled / total * 100) + '%';
  });

  // ── Parse URL slug ──
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');

  async function init() {
    if (!slug) { showNotFound(); return; }

    // Load manifest + markdown in parallel
    let posts, rawMd;
    try {
      [posts, rawMd] = await Promise.all([
        fetch('posts/index.json').then(r => r.json()),
        fetch(`posts/${slug}.md`).then(r => { if(!r.ok) throw new Error(); return r.text(); })
      ]);
    } catch {
      showNotFound(); return;
    }

    const meta = posts.find(p => p.slug === slug);
    if (!meta) { showNotFound(); return; }

    // Remove the first h1 and italicized date line from markdown (we render them in hero)
    const mdBody = rawMd
      .replace(/^#\s+.+\n/m, '')          // strip h1
      .replace(/^\*Published.+\*\n/m, ''); // strip date line

    document.title = `${meta.title} — Josh`;

    // ── Render hero ──
    const hero = document.getElementById('post-hero');
    hero.innerHTML = `
      <div class="post-tags">
        ${meta.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
      </div>
      <h1 class="post-title">${meta.title}</h1>
      <p class="post-description">${meta.description}</p>
      <div class="post-meta">
        <span>${formatDate(meta.date)}</span>
        <span class="post-meta-dot"></span>
        <span>${meta.readTime} read</span>
        <span class="post-meta-dot"></span>
        <span>Josh</span>
      </div>
    `;

    // ── Render markdown ──
    marked.setOptions({ breaks: false, gfm: true });
    const html = marked.parse(mdBody);
    const contentEl = document.getElementById('post-content');
    contentEl.innerHTML = html;

    // Syntax highlight code blocks
    contentEl.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

    // ── Build TOC ──
    const headings = contentEl.querySelectorAll('h2, h3');
    const tocList = document.getElementById('toc-list');
    headings.forEach(h => {
      const id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      h.id = id;
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      if (h.tagName === 'H3') a.style.paddingLeft = '20px';
      li.appendChild(a);
      tocList.appendChild(li);
    });

    // Active TOC highlight on scroll
    const tocLinks = tocList.querySelectorAll('a');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          tocLinks.forEach(a => a.classList.remove('active'));
          const active = tocList.querySelector(`a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    headings.forEach(h => observer.observe(h));

    // ── Next posts ──
    const others = posts.filter(p => p.slug !== slug).slice(0, 2);
    const nextGrid = document.getElementById('next-grid');
    nextGrid.innerHTML = others.map(p => `
      <a class="next-card" href="post.html?slug=${p.slug}">
        <span class="next-card-dir">${p.tags[0]}</span>
        <h4>${p.title}</h4>
        <span style="font-size:13px;color:var(--muted)">${p.readTime} read</span>
      </a>
    `).join('');

    // ── Show everything ──
    document.getElementById('post-layout').style.display = 'grid';
    document.getElementById('next-posts').style.display = 'block';

    // ── Animate ──
    gsap.to(hero, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out', delay: 0.1 });
    gsap.fromTo(contentEl, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out', delay: 0.3 });
    if (headings.length > 0) {
      gsap.fromTo('#post-toc', { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 0.5 });
    }
  }

  function showNotFound() {
    document.getElementById('post-hero').innerHTML = `
      <div class="not-found">
        <h2>Article not found</h2>
        <p>This post doesn't exist yet.</p>
        <a href="index.html" style="margin-top:12px;color:var(--accent);font-weight:600;text-decoration:none;">← Back home</a>
      </div>
    `;
    gsap.to('#post-hero', { opacity: 1, duration: 0.5 });
  }

  function formatDate(str) {
    return new Date(str).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  init();
</script>
</body>
</html>
